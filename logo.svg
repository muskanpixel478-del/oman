<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 80">
  <!-- Icon mark -->
  <g transform="translate(40,40)">
    <!-- Outer diamond -->
    <polygon points="0,-34 34,0 0,34 -34,0" fill="none" stroke="#FFB800" stroke-width="1.5"/>
    <!-- Inner diamond accent -->
    <polygon points="0,-26 26,0 0,26 -26,0" fill="none" stroke="#FFB800" stroke-width="0.6" opacity="0.4"/>
    <!-- Stylized A: left leg -->
    <line x1="0" y1="-20" x2="-12" y2="18" stroke="#FFB800" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Stylized A: right leg -->
    <line x1="0" y1="-20" x2="12" y2="18" stroke="#FFB800" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Stylized A: crossbar -->
    <line x1="-6.5" y1="3" x2="6.5" y2="3" stroke="#FFB800" stroke-width="2" stroke-linecap="round"/>
    <!-- Tip dots -->
    <circle cx="0"   cy="-34" r="1.6" fill="#FFB800"/>
    <circle cx="34"  cy="0"   r="1.6" fill="#FFB800"/>
    <circle cx="0"   cy="34"  r="1.6" fill="#FFB800"/>
    <circle cx="-34" cy="0"   r="1.6" fill="#FFB800"/>
  </g>

  <!-- Vertical divider -->
  <line x1="86" y1="14" x2="86" y2="66" stroke="#FFB800" stroke-width="0.8" opacity="0.5"/>

  <!-- Wordmark -->
  <text x="100" y="32"
    font-family="Oswald, 'Arial Narrow', sans-serif"
    font-size="21"
    font-weight="500"
    fill="#FFB800"
    letter-spacing="2.5"
    text-anchor="start">ABU MUHAMMAD AZAN</text>

  <!-- Subtitle line -->
  <line x1="100" y1="40" x2="408" y2="40" stroke="#FFB800" stroke-width="0.5" opacity="0.3"/>

  <!-- Subtitle text -->
  <text x="100" y="56"
    font-family="Oswald, 'Arial Narrow', sans-serif"
    font-size="10"
    font-weight="400"
    fill="rgba(255,255,255,0.45)"
    letter-spacing="2.8"
    text-anchor="start">INTERIOR DECORATION &amp; CONSTRUCTION · OMAN</text>
</svg>
