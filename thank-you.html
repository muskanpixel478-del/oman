<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You | Abu Muhammad Azan</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    .thank-you-section {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background-color: var(--bg-light);
    }
    
    .thank-you-box {
      background: white;
      padding: 60px 40px;
      border-radius: 20px;
      box-shadow: 0 15px 40px rgba(59, 26, 14, 0.1);
      max-width: 600px;
      width: 90%;
    }

    .check-icon {
      font-size: 5rem;
      color: #25D366;
      margin-bottom: 20px;
    }

    .thank-you-box h1 {
      color: var(--primary-color);
      font-size: 2.5rem;
      margin-bottom: 15px;
    }

    .thank-you-box p {
      color: #555;
      font-size: 1.2rem;
      margin-bottom: 10px;
    }
    
    .highlight-text {
      color: var(--accent-color);
      font-weight: 600;
      font-size: 1.3rem;
      margin: 20px 0 30px;
    }
  </style>
</head>
<body>

  <div class="thank-you-section">
    <div class="thank-you-box">
      <i class="fa-solid fa-circle-check check-icon"></i>
      <h1>Thank You!</h1>
      <p>For Choosing <strong>Abu Muhammad Azan</strong></p>
      <p class="highlight-text">Your Trusted Partner in Oman</p>
      <p style="font-size: 1rem; color: #888; margin-bottom: 30px;">We are available from 8 AM – 10 PM. Our team will get back to you shortly.</p>
      <a href="index.html" class="btn btn-primary">Back to Home</a>
    </div>
  </div>

</body>
</html>
