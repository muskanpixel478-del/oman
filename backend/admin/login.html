<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Abu Muhammad Azan</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #1C0F06 0%, #2E1A08 50%, #1C0F06 100%);
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .login-wrap { width: 100%; max-width: 420px; padding: 24px; }
    .login-box {
      background: rgba(255,255,255,0.04); backdrop-filter: blur(10px);
      border: 1px solid rgba(200,168,75,0.25); border-radius: 16px;
      padding: 44px 40px; box-shadow: 0 24px 60px rgba(0,0,0,0.4);
    }
    .logo-section { text-align: center; margin-bottom: 36px; }
    .logo-icon {
      width: 72px; height: 72px; border-radius: 50%;
      background: rgba(200,168,75,0.12); border: 2px solid rgba(200,168,75,0.4);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px; font-size: 1.8rem; color: #C8A84B;
    }
    .logo-name { color: #C8A84B; font-size: 1.2rem; font-weight: 700; letter-spacing: 1.5px; }
    .logo-sub  { color: rgba(232,213,176,0.5); font-size: 0.72rem; letter-spacing: 2px; margin-top: 4px; }
    .admin-tag {
      background: rgba(200,168,75,0.15); color: #C8A84B;
      font-size: 0.72rem; font-weight: 700; letter-spacing: 2px;
      padding: 4px 12px; border-radius: 20px; display: inline-block; margin-top: 10px;
    }
    h2 { color: #F5F0E8; font-size: 1.5rem; font-weight: 700; margin-bottom: 6px; }
    .subtitle { color: rgba(232,213,176,0.5); font-size: 0.85rem; margin-bottom: 30px; }
    .form-group { margin-bottom: 18px; }
    label { display: block; color: rgba(232,213,176,0.7); font-size: 0.8rem; font-weight: 600; margin-bottom: 8px; letter-spacing: 0.5px; }
    .input-wrap { position: relative; }
    .input-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: rgba(200,168,75,0.5); font-size: 0.9rem; }
    input {
      width: 100%; padding: 12px 14px 12px 40px;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(200,168,75,0.2);
      border-radius: 8px; color: #F5F0E8; font-size: 0.95rem; outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #C8A84B; background: rgba(255,255,255,0.09); }
    input::placeholder { color: rgba(232,213,176,0.3); }
    .toggle-pass {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      color: rgba(200,168,75,0.4); cursor: pointer; font-size: 0.9rem; background: none; border: none;
    }
    .toggle-pass:hover { color: #C8A84B; }
    .btn-login {
      width: 100%; padding: 14px; background: #C8A84B; border: none;
      border-radius: 8px; color: #1C0F06; font-size: 1rem; font-weight: 700;
      cursor: pointer; letter-spacing: 0.5px; transition: all 0.2s; margin-top: 8px;
    }
    .btn-login:hover:not(:disabled) { background: #E5C96A; transform: translateY(-1px); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }
    .error-msg {
      background: rgba(231,76,60,0.15); border: 1px solid rgba(231,76,60,0.3);
      color: #ff8a80; padding: 10px 14px; border-radius: 8px;
      font-size: 0.83rem; margin-bottom: 18px; display: none; align-items: center; gap: 8px;
    }
    .error-msg.show { display: flex; }
    .footer-note { text-align: center; margin-top: 24px; color: rgba(232,213,176,0.25); font-size: 0.72rem; }
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="login-box">
    <div class="logo-section">
      <div class="logo-icon"><i class="fa-solid fa-gem"></i></div>
      <div class="logo-name">ABU MUHAMMAD AZAN</div>
      <div class="logo-sub">INTERIOR DECORATION · OMAN</div>
      <div class="admin-tag">ADMIN PANEL</div>
    </div>

    <div class="error-msg" id="errorMsg">
      <i class="fa-solid fa-circle-xmark"></i>
      <span id="errorText">Invalid credentials</span>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label>USERNAME</label>
        <div class="input-wrap">
          <i class="fa-solid fa-user input-icon"></i>
          <input type="text" id="username" placeholder="Enter username" autocomplete="username" required>
        </div>
      </div>
      <div class="form-group">
        <label>PASSWORD</label>
        <div class="input-wrap">
          <i class="fa-solid fa-lock input-icon"></i>
          <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" required>
          <button type="button" class="toggle-pass" id="togglePass">
            <i class="fa-solid fa-eye" id="eyeIcon"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="btn-login" id="loginBtn">
        <i class="fa-solid fa-arrow-right-to-bracket"></i> Sign In
      </button>
    </form>
    <div class="footer-note">Secured · Session expires after 2 hours of inactivity</div>
  </div>
</div>

<script>
  const API = window.location.origin + '/api';

  // Redirect if already logged in
  const existing = localStorage.getItem('ama_token');
  if (existing) {
    fetch(API + '/auth/verify', { headers: { Authorization: 'Bearer ' + existing } })
      .then(r => { if (r.ok) window.location.href = '/admin/dashboard.html'; });
  }

  // Toggle password visibility
  document.getElementById('togglePass').addEventListener('click', () => {
    const inp = document.getElementById('password');
    const icon = document.getElementById('eyeIcon');
    if (inp.type === 'password') { inp.type = 'text'; icon.className = 'fa-solid fa-eye-slash'; }
    else { inp.type = 'password'; icon.className = 'fa-solid fa-eye'; }
  });

  // Login form
  document.getElementById('loginForm').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const errMsg = document.getElementById('errorMsg');
    const errText = document.getElementById('errorText');
    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Signing in...';
    errMsg.classList.remove('show');

    try {
      const res = await fetch(API + '/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('username').value.trim(),
          password: document.getElementById('password').value
        })
      });
      const data = await res.json();
      if (data.success) {
        localStorage.setItem('ama_token', data.token);
        window.location.href = '/admin/dashboard.html';
      } else {
        errText.textContent = data.message || 'Invalid credentials';
        errMsg.classList.add('show');
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-arrow-right-to-bracket"></i> Sign In';
      }
    } catch {
      errText.textContent = 'Cannot connect to server. Make sure backend is running.';
      errMsg.classList.add('show');
      btn.disabled = false;
      btn.innerHTML = '<i class="fa-solid fa-arrow-right-to-bracket"></i> Sign In';
    }
  });
</script>
</body>
</html>
