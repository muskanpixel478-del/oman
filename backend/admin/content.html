<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Content — AMA Admin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="assets/admin.css">
</head>
<body>
<div class="admin-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">ABU MUHAMMAD AZAN<span>ADMIN PANEL</span></div>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html"><i class="fa-solid fa-gauge-high"></i> Dashboard</a>
      <a href="gallery.html"><i class="fa-solid fa-images"></i> Gallery</a>
      <a href="inquiries.html"><i class="fa-solid fa-envelope"></i> Inquiries</a>
      <a href="content.html" class="active"><i class="fa-solid fa-pen-to-square"></i> Edit Content</a>
      <a href="settings.html"><i class="fa-solid fa-gear"></i> Settings</a>
    </nav>
    <div class="sidebar-footer">© 2026 Abu Muhammad Azan</div>
  </aside>

  <div class="main-content">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="sidebar-toggle" id="sidebarToggle"><i class="fa-solid fa-bars"></i></button>
        <span class="topbar-title">Edit Website Content</span>
      </div>
      <div class="topbar-right">
        <span class="topbar-user"><i class="fa-solid fa-user-shield" style="color:var(--gold)"></i> <span id="adminUsername">admin</span></span>
        <button class="btn-logout" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
      </div>
    </div>

    <div class="page-content">

      <!-- Contact Info -->
      <div class="card" id="contact">
        <div class="card-header"><span class="card-title"><i class="fa-solid fa-phone" style="color:var(--gold)"></i> Contact Information</span></div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">WhatsApp Number</label>
            <input type="text" class="form-control" id="whatsapp" placeholder="+968 9290 3653">
          </div>
          <div class="form-group">
            <label class="form-label">Phone Number</label>
            <input type="text" class="form-control" id="phone" placeholder="+968 9290 3653">
          </div>
          <div class="form-group">
            <label class="form-label">Working Hours</label>
            <input type="text" class="form-control" id="hours" placeholder="8:00 AM – 10:00 PM">
          </div>
          <div class="form-group">
            <label class="form-label">Address</label>
            <input type="text" class="form-control" id="address" placeholder="Muscat, Oman">
          </div>
        </div>
        <button class="btn btn-primary" onclick="saveContact()"><i class="fa-solid fa-save"></i> Save Contact Info</button>
      </div>

      <!-- Stats -->
      <div class="card">
        <div class="card-header"><span class="card-title"><i class="fa-solid fa-chart-bar" style="color:var(--gold)"></i> Stats Numbers</span></div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Projects Completed</label>
            <input type="number" class="form-control" id="statProjects">
          </div>
          <div class="form-group">
            <label class="form-label">Years of Experience</label>
            <input type="number" class="form-control" id="statYears">
          </div>
          <div class="form-group">
            <label class="form-label">Happy Clients</label>
            <input type="number" class="form-control" id="statClients">
          </div>
          <div class="form-group">
            <label class="form-label">Awards Won</label>
            <input type="number" class="form-control" id="statAwards">
          </div>
        </div>
        <button class="btn btn-primary" onclick="saveStats()"><i class="fa-solid fa-save"></i> Save Stats</button>
      </div>

      <!-- About -->
      <div class="card">
        <div class="card-header"><span class="card-title"><i class="fa-solid fa-building" style="color:var(--gold)"></i> About Us Text</span></div>
        <div class="form-group">
          <label class="form-label">Company Description</label>
          <textarea class="form-control" id="about" rows="5" placeholder="Describe your company..."></textarea>
        </div>
        <button class="btn btn-primary" onclick="saveAbout()"><i class="fa-solid fa-save"></i> Save About</button>
      </div>

      <!-- Services -->
      <div class="card" id="services">
        <div class="card-header">
          <span class="card-title"><i class="fa-solid fa-screwdriver-wrench" style="color:var(--gold)"></i> Services</span>
          <button class="btn btn-primary btn-sm" onclick="addService()"><i class="fa-solid fa-plus"></i> Add Service</button>
        </div>
        <div id="servicesList"></div>
        <button class="btn btn-primary" style="margin-top:16px" onclick="saveServices()"><i class="fa-solid fa-save"></i> Save Services</button>
      </div>

    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>
<script src="assets/admin.js"></script>
<script>
  let contentData = {};

  (async () => {
    if (!await requireAuth()) return;
    await loadContent();
  })();

  async function loadContent() {
    const data = await apiFetch('/content');
    if (!data?.success) return;
    contentData = data.content || {};
    document.getElementById('whatsapp').value = contentData.whatsapp || '';
    document.getElementById('phone').value    = contentData.phone    || '';
    document.getElementById('hours').value    = contentData.hours    || '';
    document.getElementById('address').value  = contentData.address  || '';
    document.getElementById('about').value    = contentData.about    || '';
    const s = contentData.stats || {};
    document.getElementById('statProjects').value = s.projects || 0;
    document.getElementById('statYears').value    = s.years    || 0;
    document.getElementById('statClients').value  = s.clients  || 0;
    document.getElementById('statAwards').value   = s.awards   || 0;
    renderServices(contentData.services || []);
  }

  async function save(payload) {
    const data = await apiFetch('/content', { method:'PUT', body: JSON.stringify(payload) });
    if (data?.success) showToast('Saved successfully!', 'success');
    else showToast(data?.message || 'Save failed', 'error');
  }

  function saveContact() {
    save({ whatsapp: document.getElementById('whatsapp').value, phone: document.getElementById('phone').value, hours: document.getElementById('hours').value, address: document.getElementById('address').value });
  }

  function saveStats() {
    save({ stats: { projects: +document.getElementById('statProjects').value, years: +document.getElementById('statYears').value, clients: +document.getElementById('statClients').value, awards: +document.getElementById('statAwards').value } });
  }

  function saveAbout() { save({ about: document.getElementById('about').value }); }

  function renderServices(services) {
    const list = document.getElementById('servicesList');
    list.innerHTML = services.map((s, i) => `
      <div class="service-item" id="svc-${i}" style="display:flex;gap:12px;align-items:flex-start;margin-bottom:12px;padding:12px;background:#faf7f2;border-radius:8px">
        <div style="flex:1">
          <input type="text" class="form-control" value="${s.name || ''}" placeholder="Service name" style="margin-bottom:8px" oninput="updateService(${i},'name',this.value)">
          <textarea class="form-control" rows="2" placeholder="Service description" oninput="updateService(${i},'description',this.value)">${s.description || ''}</textarea>
        </div>
        <button class="btn btn-danger btn-sm" onclick="removeService(${i})"><i class="fa-solid fa-trash"></i></button>
      </div>`).join('');
  }

  let services = [];
  async function initServices() {
    services = [...(contentData.services || [])];
  }

  function addService() {
    const newServices = [...(contentData.services || []), { name: '', description: '' }];
    contentData.services = newServices;
    renderServices(newServices);
  }

  function updateService(i, key, val) {
    if (!contentData.services) return;
    contentData.services[i][key] = val;
  }

  function removeService(i) {
    if (!confirm('Remove this service?')) return;
    contentData.services.splice(i, 1);
    renderServices(contentData.services);
  }

  function saveServices() { save({ services: contentData.services }); }
</script>
</body>
</html>
