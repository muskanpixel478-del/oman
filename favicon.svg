<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="10" fill="#06060F"/>

  <!-- Circle with 4 diamond accents -->
  <g transform="translate(32,32)">
    <circle cx="0" cy="0" r="22" fill="none" stroke="#D4AF37" stroke-width="1.8"/>
    <polygon points="0,-22 3,-17 0,-12 -3,-17" fill="#D4AF37"/>
    <polygon points="0,22 3,17 0,12 -3,17" fill="#D4AF37"/>
    <polygon points="22,0 17,3 12,0 17,-3" fill="#D4AF37"/>
    <polygon points="-22,0 -17,3 -12,0 -17,-3" fill="#D4AF37"/>
    <circle cx="0" cy="0" r="1.5" fill="#D4AF37" opacity="0.5"/>
  </g>
</svg>
