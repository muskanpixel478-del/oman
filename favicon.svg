<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="10" fill="#06060F"/>

  <!-- AMA circle monogram -->
  <g transform="translate(32,32)">
    <circle cx="0" cy="0" r="24" fill="none" stroke="#FFB800" stroke-width="1.8"/>
    <line x1="0" y1="-24" x2="0" y2="-28" stroke="#FFB800" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="0" y1="24"  x2="0" y2="28"  stroke="#FFB800" stroke-width="1.8" stroke-linecap="round"/>
    <text x="0" y="5"
      font-family="Oswald, 'Arial Narrow', Arial, sans-serif"
      font-size="13"
      font-weight="500"
      fill="#FFB800"
      text-anchor="middle"
      letter-spacing="2">AMA</text>
  </g>
</svg>
