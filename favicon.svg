<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="10" fill="#06060F"/>

  <!-- Outer diamond -->
  <polygon points="32,4 60,32 32,60 4,32" fill="none" stroke="#FFB800" stroke-width="1.5"/>

  <!-- Inner diamond accent (subtle) -->
  <polygon points="32,11 53,32 32,53 11,32" fill="none" stroke="#FFB800" stroke-width="0.5" opacity="0.35"/>

  <!-- Stylized A: left leg -->
  <line x1="32" y1="17" x2="19" y2="47" stroke="#FFB800" stroke-width="2.8" stroke-linecap="round"/>
  <!-- Stylized A: right leg -->
  <line x1="32" y1="17" x2="45" y2="47" stroke="#FFB800" stroke-width="2.8" stroke-linecap="round"/>
  <!-- Stylized A: crossbar -->
  <line x1="23" y1="36" x2="41" y2="36" stroke="#FFB800" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Diamond tip dots -->
  <circle cx="32" cy="4"  r="1.8" fill="#FFB800"/>
  <circle cx="60" cy="32" r="1.8" fill="#FFB800"/>
  <circle cx="32" cy="60" r="1.8" fill="#FFB800"/>
  <circle cx="4"  cy="32" r="1.8" fill="#FFB800"/>
</svg>
