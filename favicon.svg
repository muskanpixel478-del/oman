<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="10" fill="#06060F"/>

  <!-- Architectural arch mark -->
  <g transform="translate(32,36)">
    <!-- Outer arch -->
    <path d="M -16,18 L -16,-4 Q -16,-22 0,-22 Q 16,-22 16,-4 L 16,18"
          fill="none" stroke="#FFB800" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Floor line -->
    <line x1="-21" y1="18" x2="21" y2="18" stroke="#FFB800" stroke-width="2.2" stroke-linecap="round"/>
    <!-- Inner arch accent -->
    <path d="M -8,18 L -8,4 Q -8,-9 0,-9 Q 8,-9 8,4 L 8,18"
          fill="none" stroke="#FFB800" stroke-width="1" opacity="0.45" stroke-linecap="round"/>
    <!-- Crown dot -->
    <circle cx="0" cy="-22" r="2" fill="#FFB800"/>
    <!-- Base corner dots -->
    <circle cx="-16" cy="18" r="1.5" fill="#FFB800"/>
    <circle cx="16"  cy="18" r="1.5" fill="#FFB800"/>
  </g>
</svg>
